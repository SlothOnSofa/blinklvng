version: '3.8'

services:
  blinklvng-website:
    build: .
    container_name: blinklvng-website
    restart: unless-stopped
    # Remove the 'ports: 80:80' because Traefik handles it
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blinklvng.rule=Host(`blinklvng.com`) || Host(`www.blinklvng.com`)"
      - "traefik.http.services.blinklvng.loadbalancer.server.port=80"
      - "traefik.http.routers.blinklvng.entrypoints=websecure"
      - "traefik.http.routers.blinklvng.tls.certresolver=letsencrypt"
